<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoneyWire Sentinel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        // Theme initialization
        if (localStorage.getItem('theme') === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark')
        } else {
            document.documentElement.classList.add('dark')
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Enhanced Severity Bleeds */
        .bleed-critical { border-left: 4px solid #f43f5e !important; background: linear-gradient(90deg, rgba(244, 63, 94, 0.08) 0%, transparent 100%); }
        .bleed-high { border-left: 4px solid #fb923c !important; background: linear-gradient(90deg, rgba(251, 146, 60, 0.06) 0%, transparent 100%); }
        .bleed-medium { border-left: 4px solid #facc15 !important; background: linear-gradient(90deg, rgba(250, 204, 21, 0.05) 0%, transparent 100%); }
        .bleed-low { border-left: 4px solid #3b82f6 !important; background: linear-gradient(90deg, rgba(59, 130, 246, 0.05) 0%, transparent 100%); }
        .bleed-info { border-left: 4px solid #3f3f46 !important; background: linear-gradient(90deg, rgba(63, 63, 70, 0.05) 0%, transparent 100%); }

        .severity-badge {
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-weight: 900;
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-width: 1px;
            background-color: #ffffff;
            box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
        }
        .dark .severity-badge { background-color: transparent; box-shadow: none; }
        .severity-critical { color: #f43f5e; border-color: rgba(244, 63, 94, 0.3); }
        .severity-high { color: #fb923c; border-color: rgba(251, 146, 60, 0.3); }
        .severity-medium { color: #eab308; border-color: rgba(250, 204, 21, 0.3); }
        .severity-low { color: #3b82f6; border-color: rgba(59, 130, 246, 0.3); }
        .severity-info { color: #71717a; border-color: rgba(161, 161, 170, 0.3); }

        .sensor-card:hover .last-seen { opacity: 1; transform: translateY(0); }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #d4d4d8; border-radius: 999px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background-color: #212121; }
        
        /* Tactical Grid Background */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(161, 161, 170, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(161, 161, 170, 0.05) 1px, transparent 1px);
        }
        .dark .bg-grid {
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        }
    </style>
</head>
<body class="p-4 lg:p-6 bg-zinc-50 dark:bg-[#050507] text-zinc-900 dark:text-zinc-300 bg-grid transition-colors duration-300" x-data="sentinel()">

    <div class="max-w-[1500px] mx-auto space-y-6">
        
        <header class="flex justify-between items-center bg-white/95 dark:bg-zinc-900/90 backdrop-blur-xl p-4 px-6 rounded-2xl border border-zinc-200 dark:border-zinc-800/50 shadow-xl dark:shadow-lg transition-colors">
            <div class="flex items-center gap-3">
                <div class="text-xl">🕸️</div>
                <div class="flex items-baseline gap-2">
                    <h1 class="text-lg font-extrabold text-zinc-900 dark:text-white tracking-tighter">HONEYWIRE <span class="text-zinc-400 dark:text-zinc-500 font-medium uppercase text-xs tracking-widest">Sentinel</span></h1>
                    <span class="text-[10px] font-black text-zinc-500 dark:text-zinc-400 uppercase tracking-widest">v<span x-text="version"></span></span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="p-2 mr-2 rounded-xl bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all">
                    <svg id="moon-icon" class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg id="sun-icon" class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </button>

                <button x-show="unreadCount > 0" @click="markAllRead()" x-cloak
                        class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-rose-500/30 bg-rose-50 dark:bg-rose-500/10 text-rose-600 dark:text-rose-500 text-[10px] font-black transition-all hover:bg-rose-100 dark:hover:bg-rose-500/20">
                    <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse shadow-[0_0_8px_rgba(244,63,94,0.6)]"></span>
                    <span x-text="unreadCount + ' UNREAD'"></span>
                </button>

                <div @click="toggleArmed()" class="cursor-pointer px-4 py-2 rounded-xl text-[10px] font-black transition-all border"
                     :class="isArmed ? 'bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-500 border-emerald-500/30 shadow-[0_0_15px_rgba(16,185,129,0.1)]' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-500 border-zinc-300 dark:border-zinc-700'">
                    <span x-text="isArmed ? '● SYSTEM ARMED' : '○ SYSTEM PASSIVE'"></span>
                </div>
                <button @click="clearLogs()" class="text-[10px] font-black text-zinc-500 hover:text-red-500 transition-all uppercase tracking-[0.2em]">Purge Logs</button>
                <a href="/logout" class="text-[10px] font-black text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all uppercase tracking-[0.2em]">Exit</a>
            </div>
        </header>

        <div class="flex flex-wrap gap-2 items-center">
            <button @click="selectedSensor = null" 
                    class="px-4 py-2 rounded-xl border text-[10px] font-black transition-all uppercase tracking-widest"
                    :class="!selectedSensor ? 'bg-emerald-500 text-white dark:text-black border-emerald-600 dark:border-emerald-400 shadow-lg shadow-emerald-500/20' : 'bg-white dark:bg-zinc-900/50 border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-500 hover:border-zinc-300 dark:hover:border-zinc-600'">
                All Traffic
            </button>
            <template x-for="s in fleet" :key="s.sensor_id">
                <div class="relative group sensor-card">
                    <button @click="selectedSensor = s.sensor_id" 
                            class="flex items-center gap-3 px-3 py-1.5 rounded-xl border transition-all"
                            :class="selectedSensor === s.sensor_id ? 'bg-zinc-100 dark:bg-zinc-800 border-zinc-400 dark:border-zinc-500 shadow-lg' : 'bg-white dark:bg-zinc-900/90 border-zinc-200 dark:border-zinc-800/60 hover:border-emerald-500/50'">
                        <span class="w-2 h-2 rounded-full" :class="s.status === 'online' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]' : 'bg-red-500'"></span>
                        <span class="text-[11px] font-bold text-zinc-700 dark:text-zinc-300 uppercase tracking-tight" x-text="s.sensor_id"></span>
                    </button>
                    <div class="last-seen opacity-0 pointer-events-none absolute -bottom-8 left-0 right-0 text-center transition-all transform translateY(4px) z-50">
                        <span class="bg-zinc-800 text-zinc-200 text-[9px] px-2 py-1 rounded border border-zinc-700 whitespace-nowrap shadow-xl"
                              x-text="s.status === 'online' ? 'Active' : 'Last seen: ' + s.last_seen"></span>
                    </div>
                </div>
            </template>
        </div>

        <div class="grid grid-cols-12 gap-6">
            
            <aside class="col-span-12 lg:col-span-3">
                <div class="bg-white dark:bg-zinc-900/90 border border-zinc-200 dark:border-zinc-800/50 p-6 rounded-3xl sticky top-6 shadow-2xl transition-colors">
                    <h3 class="text-[10px] font-black text-zinc-500 dark:text-zinc-600 uppercase tracking-[0.25em] mb-8 text-center">Threat Distribution</h3>
                    <div class="h-60 relative">
                        <canvas id="severityChart"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-2">
                            <span class="text-3xl font-black text-zinc-900 dark:text-white" x-text="events.length"></span>
                            <span class="text-[9px] font-bold text-zinc-400 dark:text-zinc-600 uppercase tracking-widest mt-1">Events</span>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="col-span-12 lg:col-span-9">
                <div class="bg-white dark:bg-zinc-900/90 border border-zinc-200 dark:border-zinc-800/60 rounded-[2rem] overflow-hidden shadow-2xl transition-colors">
                    <div class="px-8 py-5 border-b border-zinc-200 dark:border-zinc-800/50 flex justify-between items-center bg-zinc-50 dark:bg-zinc-800/20">
                        <h2 class="text-sm font-extrabold text-zinc-800 dark:text-zinc-300 uppercase tracking-[0.25em]">Intercepted Data Stream</h2>
                        <div class="flex items-center gap-2 text-[10px] font-bold text-zinc-500 dark:text-zinc-600">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            Live
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-widest bg-zinc-50 dark:bg-zinc-900/90 border-b border-zinc-200 dark:border-zinc-800">
                                <tr>
                                    <th class="px-8 py-4">Threat</th>
                                    <th class="px-6 py-4">Event Trigger</th>
                                    <th class="px-6 py-4">Source IP</th>
                                    <th class="px-6 py-4">Target</th>
                                    <th class="px-6 py-4 text-right">Sensor Node</th>
                                    <th class="px-8 py-4 text-right">Time</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-zinc-100 dark:divide-zinc-800/50">
                                <tr x-show="filteredEvents.length === 0" x-cloak>
                                    <td colspan="6" class="px-8 py-12 text-center text-zinc-500 dark:text-zinc-600 text-xs font-bold uppercase tracking-widest">
                                        No events detected for this filter
                                    </td>
                                </tr>
                                <template x-for="event in filteredEvents" :key="event.id">
                                    <tr class="relative hover:bg-zinc-50 dark:hover:bg-zinc-800/60 transition-all duration-150 cursor-pointer group border-l-4 border-transparent" 
                                        :class="'bleed-' + event.severity"
                                        @click="openEvent(event)">
                                        <td class="px-8 py-5 flex items-center gap-3">
                                            <div x-show="!event.is_read" class="w-1.5 h-1.5 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.8)]"></div>
                                            <span class="severity-badge" :class="'severity-' + event.severity" x-text="event.severity"></span>
                                        </td>
                                        <td class="px-6 py-5 font-semibold text-zinc-800 dark:text-zinc-100 text-sm capitalize tracking-tight" x-text="event.event_type.replace(/_/g, ' ')"></td>
                                        <td class="px-6 py-5 text-zinc-600 dark:text-zinc-300 mono text-sm" x-text="event.source"></td>
                                        <td class="px-6 py-5 text-zinc-600 dark:text-zinc-300 mono text-sm" x-text="event.target"></td>
                                        <td class="px-6 py-5 text-right text-[11px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-tighter" x-text="event.sensor_id"></td>
                                        <td class="px-8 py-5 text-right text-[11px] mono text-zinc-400 dark:text-zinc-500" x-text="event.timestamp.split(' ')[1]"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div x-show="modal" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-zinc-900/60 dark:bg-black/90 backdrop-blur-md" 
             x-transition:leave="transition ease-in duration-150" x-transition:leave-end="opacity-0"
             @click="modal = false"></div>
        
        <div class="relative bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 w-full max-w-2xl rounded-[2.5rem] p-8 transition-all duration-500 overflow-hidden shadow-2xl"
             :class="{
                'dark:border-rose-500/40 dark:shadow-[0_0_50px_rgba(244,63,94,0.15)]': activeEvent?.severity === 'critical',
                'dark:border-orange-500/40 dark:shadow-[0_0_50px_rgba(251,146,60,0.15)]': activeEvent?.severity === 'high',
                'dark:border-amber-500/40 dark:shadow-[0_0_50px_rgba(250,204,21,0.15)]': activeEvent?.severity === 'medium',
                'dark:border-sky-500/40 dark:shadow-[0_0_50px_rgba(56,130,246,0.15)]': activeEvent?.severity === 'low',
                'dark:border-zinc-500/40 dark:shadow-[0_0_50px_rgba(161,161,170,0.15)]': activeEvent?.severity === 'info' || !activeEvent?.severity
             }"
             x-transition:enter="transition ease-out duration-200" x-transition:enter-start="scale-95 opacity-0"
             x-transition:enter-end="scale-100 opacity-100"
             x-transition:leave="transition ease-in duration-150" x-transition:leave-end="scale-95 opacity-0">
            
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h2 class="text-3xl font-black text-zinc-900 dark:text-white tracking-tighter capitalize" x-text="activeEvent?.event_type.replace(/_/g, ' ')"></h2>
                    <p class="text-[10px] font-mono text-zinc-400 dark:text-zinc-500 mt-1 uppercase tracking-widest" x-text="'Trace_ID: ' + activeEvent?.id"></p>
                </div>
                <span class="severity-badge text-xs" :class="'severity-' + activeEvent?.severity" x-text="activeEvent?.severity"></span>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-zinc-50 dark:bg-zinc-950/70 p-4 rounded-2xl border border-zinc-200 dark:border-zinc-800/50">
                    <div class="text-[9px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-widest mb-1">Source IP</div>
                    <div class="text-sm font-bold text-zinc-800 dark:text-zinc-200 mono" x-text="activeEvent?.source"></div>
                </div>
                <div class="bg-zinc-50 dark:bg-zinc-950/70 p-4 rounded-2xl border border-zinc-200 dark:border-zinc-800/50">
                    <div class="text-[9px] font-black text-zinc-400 dark:text-zinc-500 uppercase tracking-widest mb-1">Target Point</div>
                    <div class="text-sm font-bold text-zinc-800 dark:text-zinc-200 mono" x-text="activeEvent?.target"></div>
                </div>
            </div>

            <div class="space-y-4 max-h-[45vh] overflow-y-auto pr-2 custom-scroll">
                <template x-for="(val, key) in activeEvent?.details" :key="key">
                    <div class="bg-zinc-50 dark:bg-zinc-950/40 border border-zinc-200 dark:border-zinc-800 rounded-xl p-4">
                        <div class="text-[10px] text-zinc-500 font-bold mb-2 uppercase tracking-widest" x-text="key.replace(/_/g, ' ')"></div>
                        
                        <template x-if="Array.isArray(val)">
                            <div class="space-y-2">
                                <template x-for="(item, index) in val.slice(0, 50)" :key="index">
                                    <pre class="bg-white dark:bg-[#0c0c0e] border border-zinc-200 dark:border-[#1f1f23] rounded-lg p-3 text-xs text-emerald-600 dark:text-emerald-400 mono overflow-x-auto custom-scroll" x-text="item"></pre>
                                </template>
                                <div x-show="val.length > 50" class="text-[9px] text-zinc-400 dark:text-zinc-600 font-bold uppercase tracking-widest text-center mt-2">
                                    <span x-text="'+ ' + (val.length - 50) + ' MORE PACKETS TRUNCATED FOR PERFORMANCE'"></span>
                                </div>
                            </div>
                        </template>
                        
                        <template x-if="!Array.isArray(val)">
                            <div class="text-sm font-medium text-zinc-800 dark:text-zinc-200 mono break-all" x-text="val"></div>
                        </template>
                    </div>
                </template>
            </div>

            <button @click="modal = false" class="w-full mt-8 py-4 bg-zinc-100 hover:bg-zinc-200 dark:bg-zinc-800 dark:hover:bg-zinc-700 text-zinc-600 dark:text-white text-[10px] font-black rounded-2xl transition-all tracking-[0.3em]">CLOSE_INSPECTOR</button>
        </div>
    </div>

    <script>
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        const neonGlowPlugin = {
            id: 'neonGlow',
            beforeDatasetsDraw(chart) {
                // Only draw neon glow if in dark mode
                if (!document.documentElement.classList.contains('dark')) return;
                
                const ctx = chart.ctx;
                const meta = chart.getDatasetMeta(0);
                ctx.save();
                meta.data.forEach(arc => {
                    ctx.shadowColor = arc.options.backgroundColor;
                    ctx.shadowBlur = 8;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                    arc.draw(ctx); 
                });
                ctx.restore();
            }
        };

        let severityChartInstance = null;

        function sentinel() {
            return {
                events: [], fleet: [], isArmed: true, selectedSensor: null, modal: false, activeEvent: null,
                version: '1.0.0',
                
                get unreadCount() {
                    return this.events.filter(e => !e.is_read).length;
                },

                async init() {
                    await this.update();
                    this.$nextTick(() => { this.initChart(); });
                    this.$watch('selectedSensor', () => { this.refreshChart(); });
                    setInterval(() => this.update(), 5000);

                    // Optional: Re-render chart glow when theme switches
                    const observer = new MutationObserver(() => this.refreshChart());
                    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
                },

                get filteredEvents() {
                    return this.selectedSensor ? this.events.filter(e => e.sensor_id === this.selectedSensor) : this.events;
                },

                async update() {
                    try {
                        const [ev, sn, st, ver] = await Promise.all([
                            fetch('/api/v1/events').then(r => r.json()),
                            fetch('/api/v1/sensors').then(r => r.json()),
                            fetch('/api/v1/system/state').then(r => r.json()),
                            fetch('/api/v1/version').then(r => r.json()).catch(() => ({version: this.version}))
                        ]);
                        this.events = ev; 
                        this.fleet = sn; 
                        this.isArmed = st.is_armed;
                        this.version = ver.version || this.version;
                        this.refreshChart();
                    } catch(e) {}
                },

                async openEvent(e) { 
                    this.activeEvent = e; 
                    this.modal = true; 
                    
                    if (!e.is_read) {
                        e.is_read = 1; 
                        try { await fetch(`/api/v1/events/${e.id}/read`, {method: 'PATCH'}); } catch(err) {}
                    }
                },

                async markAllRead() {
                    try {
                        await fetch('/api/v1/events/read', {method: 'PATCH'});
                        this.events.forEach(e => e.is_read = 1); 
                    } catch(err) {}
                },

                async toggleArmed() {
                    const next = !this.isArmed;
                    await fetch('/api/v1/system/state', {
                        method: 'PATCH', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({is_armed: next})
                    });
                    this.isArmed = next;
                },

                async clearLogs() {
                    if(confirm("Confirm Database Purge?")) {
                        await fetch('/api/v1/events', {method: 'DELETE'});
                        this.update();
                    }
                },

                initChart() {
                    const ctx = document.getElementById('severityChart');
                    if (!ctx) return;

                    Chart.register(neonGlowPlugin);

                    severityChartInstance = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['critical', 'high', 'medium', 'low', 'info'],
                            datasets: [{
                                data: [0,0,0,0,0],
                                backgroundColor: ['#f43f5e', '#fb923c', '#eab308', '#3b82f6', '#71717a'],
                                borderWidth: 0, spacing: 6, borderRadius: 3
                            }]
                        },
                        options: { 
                            cutout: '86%', 
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: true,
                            plugins: { legend: { display: false } } 
                        }
                    });
                    this.refreshChart(); 
                },

                refreshChart() {
                    if (!severityChartInstance) return;

                    const counts = { critical: 0, high: 0, medium: 0, low: 0, info: 0 };
                    this.filteredEvents.forEach(e => {
                        const s = e.severity ? e.severity.toLowerCase() : 'info';
                        if (counts.hasOwnProperty(s)) counts[s]++;
                    });
                    
                    const newData = ['critical', 'high', 'medium', 'low', 'info'].map(k => counts[k]);
                    
                    if (JSON.stringify(severityChartInstance.data.datasets[0].data) !== JSON.stringify(newData)) {
                        severityChartInstance.data.datasets[0].data = newData;
                    }
                    
                    // Force update to handle theme toggles (re-drawing neon glow)
                    severityChartInstance.update();
                }
            }
        }
    </script>
</body>
</html>
