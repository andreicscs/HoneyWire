services:
  # 1. THE DECOY PROVISIONER: Safely creates missing files explicitly avoiding symlinks and directories.
  decoy-provisioner:
    image: ghcr.io/andreicscs/honeywire-filecanary:latest
    command: /app/filecanary init
    user: "0:0"
    environment:
      - HW_DECOY_FILES=${HW_DECOY_FILES}
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    volumes:
      # Manually map the parent directories of your HW_DECOY_FILES
      # Example: if HW_DECOY_FILES=/opt/.backup-db.env
      - /var/www/html:/host/var/www/html
      - /opt:/host/opt

  # 2. THE WATCHER
  file-canary:
    image: ghcr.io/andreicscs/honeywire-filecanary:latest
    container_name: hw-file-canary
    build:
      context: ../../..
      dockerfile: Sensors/official/FileCanary/Dockerfile
    restart: unless-stopped
    
    # Ensures uniform communication with a locally hosted Hub
    network_mode: "host"
    
    depends_on:
      decoy-provisioner:
        condition: service_completed_successfully

    # --- SECURITY SANDBOX ---
    user: "65532:65532"
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    # ------------------------

    environment:
      - HW_HUB_ENDPOINT=${HW_HUB_ENDPOINT}
      - HW_HUB_KEY=${HW_HUB_KEY}
      - HW_SENSOR_ID=${HW_SENSOR_ID}
      - HW_TEST_MODE=false

      # File Canary Configuration
      - HW_SEVERITY=${HW_SEVERITY}
      - HW_DECOY_FILES=${HW_DECOY_FILES}
      - HW_ALERT_ON_OPEN=${HW_ALERT_ON_OPEN:-false}

    volumes:
      # INDIVIDUAL FILE MOUNTS (Must match HW_DECOY_FILES paths prefixed with /canaries)
      # Example: HW_DECOY_FILES=/opt/.backup-db.env
      - /opt/.backup-db.env:/canaries/opt/.backup-db.env:ro