name: Hub Release & Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - 'Hub/**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  hub-security-scan:
    name: Hub Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build & Trivy Scan
        run: |
          docker build -t honeywire-hub:test ./Hub
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --severity HIGH,CRITICAL --exit-code 1 honeywire-hub:test

  publish-hub:
    name: "🚀 Publish: Official Hub Release"
    needs: [hub-security-scan]
    # Only publish on tags or manual trigger
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: 
      name: production_registry
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Hub
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/honeywire-hub"
          
          # Build and tag as 'latest' and the specific version tag
          docker build -t $IMAGE_NAME:latest ./Hub
          docker push $IMAGE_NAME:latest
          
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            docker tag $IMAGE_NAME:latest $IMAGE_NAME:$TAG_NAME
            docker push $IMAGE_NAME:$TAG_NAME
          fi