name: Hub Release & Publish

env:
  WORKING_DIR: ./Hub 

on:
  push:
    branches: [ "main" ]
    paths: [ 'Hub/**' ]
  workflow_dispatch:

jobs:
  code-security:
    name: "🛡️ FS Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # TODO: Uncomment this when we write the Fuzz tests!
      # - name: Set up Go
      #   uses: actions/setup-go@v5
      #   with:
      #     go-version: '1.25'
      # - name: Run Go Tests
      #   working-directory: ${{ env.WORKING_DIR }}
      #   run: go test -v ./...

      - name: Run Trivy Vulnerability Scanner (FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ env.WORKING_DIR }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  publish-hub:
    name: "🚀 Build & Publish Latest"
    needs: [code-security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Enables Raspberry Pi Support
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatically just tags everything pushed to main as "latest"
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/honeywire-hub
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push via Buildx
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          platforms: linux/amd64,linux/arm64 
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          
      - name: Summary
        run: |
          echo "### ✅ Hub Published Successfully" >> $GITHUB_STEP_SUMMARY
          echo "Platforms: \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY