name: Sensor PR Check & Security Scan

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - 'Sensors/community/**'
      - 'Sensors/official/**'
  
  push:
    branches:
      - main
    paths:
      - 'Sensors/**'

  workflow_dispatch:

jobs:
  static-analysis:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  docker-security-scan:
    name: Build & Trivy Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # We need to find which sensor changed to build the right Dockerfile
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: Sensors/**

      - name: Build and Scan Changed Sensors
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            SENSOR_DIR=$(dirname "$file")
            
            # Only build if there is a Dockerfile
            if [ -f "$SENSOR_DIR/Dockerfile" ]; then
              echo "Building $SENSOR_DIR..."
              docker build -t test-sensor:latest "$SENSOR_DIR"
              
              echo "Running Trivy Vulnerability Scanner..."
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              trivy image --severity HIGH,CRITICAL --exit-code 1 --no-progress test-sensor:latest
            fi
          done

  functional-test:
    name: Mock Hub Contract Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Mock Hub
        run: |
          python .github/scripts/mock_hub.py &
          sleep 3 # Give the server a second to start

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: Sensors/**

      - name: Run Test Mode on Changed Sensors
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            SENSOR_DIR=$(dirname "$file")
            
            if [ -f "$SENSOR_DIR/Dockerfile" ]; then
              docker build -t test-sensor:latest "$SENSOR_DIR"
              
              # Run the container with test mode enabled
              docker run --rm \
                -e HW_HUB_ENDPOINT="http://172.17.0.1:8080" \
                -e HW_HUB_KEY="mock_key" \
                -e HW_SENSOR_ID="ci-test-node" \
                -e HW_TEST_MODE="true" \
                test-sensor:latest
                
              # Check if the Mock Hub received the success signal
              if [ -f /tmp/test_passed ]; then
                echo "✅ Sensor successfully communicated with Mock Hub."
                rm /tmp/test_passed
              else
                echo "❌ Sensor failed to contact Mock Hub or sent invalid JSON."
                exit 1
              fi
            fi
          done

  # --- PATH A: REVIEWING A COMMUNITY PR ---
  review-community-pr:
    name: "👀 Review: Community Contribution"
    needs: [static-analysis, docker-security-scan, functional-test]
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: 
      name: community_review  # Create this in Settings -> Environments
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Report Status
        run: |
          echo "### 🛡️ Security & Functional Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "This is a **COMMUNITY** contribution. Review the code for malicious intent before merging." >> $GITHUB_STEP_SUMMARY
          echo "If you approve, the PR can be merged to main." >> $GITHUB_STEP_SUMMARY

  # --- PATH B: PUBLISHING AN OFFICIAL RELEASE ---
  publish-official-main:
    name: "🚀 Publish: Official Sensor Release"
    needs: [static-analysis, docker-security-scan, functional-test]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: 
      name: production_registry # Create this in Settings -> Environments
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Official Sensors
        run: |
          # We build from the root context '.' to ensure the SDK is included
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/honeywire-tcptripwire"
          
          echo "Building Official TcpTripWire..."
          docker build -t $IMAGE_NAME:latest -f Sensors/official/TcpTripWire/Dockerfile .
          
          echo "Pushing to Registry..."
          docker push $IMAGE_NAME:latest
          
          echo "### ✅ Official Release Published" >> $GITHUB_STEP_SUMMARY
          echo "The sensor is now live at: \`$IMAGE_NAME:latest\`" >> $GITHUB_STEP_SUMMARY