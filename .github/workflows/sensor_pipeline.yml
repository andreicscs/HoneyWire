name: Official Sensor Build & Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
    # ONLY watch the official folder. Community doc updates won't waste CI minutes.
    paths: [ 'Sensors/official/**' ]
  pull_request:
    paths: [ 'Sensors/official/**' ]
  workflow_dispatch:

jobs:
  # ==========================================
  # STAGE 1: DYNAMIC MATRIX GENERATOR
  # ==========================================
  detect-sensors:
    name: "🔍 Detect Changed Official Sensors"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed directories
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: Sensors/official/**
          dir_names: true
          # Depth 3 ensures changes in "Sensors/official/ssh-tarpit/main.go" output "Sensors/official/ssh-tarpit"
          dir_names_max_depth: 3 
          json: true

      - name: Generate Independent Matrix
        id: generate-matrix
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # On manual trigger: Find ALL folders in official/ containing a Dockerfile
            MATRIX_JSON=$(find Sensors/official -mindepth 1 -maxdepth 1 -type d -exec test -f '{}/Dockerfile' \; -print | awk -F/ '{print $3}' | jq -R -s -c 'split("\n")[:-1]')
          else
            # On Push/PR: Parse the changed files JSON
            CHANGED='${{ steps.changed-files.outputs.all_changed_files }}'
            if [ "$CHANGED" == "[]" ] || [ -z "$CHANGED" ]; then
              MATRIX_JSON="[]"
            else
              # Strips "Sensors/official/" from the path, leaving just the array of sensor names
              MATRIX_JSON=$(echo "$CHANGED" | jq -c '[.[] | sub("Sensors/official/"; "")]')
            fi
          fi
          
          echo "Generated Matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  # ==========================================
  # STAGE 2: PARALLEL TEST, SCAN, & PUBLISH
  # ==========================================
  process-sensors:
    name: "🚀 Process: ${{ matrix.sensor }}"
    needs: detect-sensors
    if: ${{ needs.detect-sensors.outputs.matrix != '[]' && needs.detect-sensors.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false 
      matrix:
        sensor: ${{ fromJson(needs.detect-sensors.outputs.matrix) }}
        
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          # Updated to target the nested directory
          cache-dependency-path: Sensors/official/${{ matrix.sensor }}/go.sum

      - name: Run Go Tests
        working-directory: Sensors/official/${{ matrix.sensor }}
        run: |
          if [ -f "go.mod" ]; then
            go test -v ./...
          else
            echo "No go.mod found, skipping native Go tests."
          fi

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: Sensors/official/${{ matrix.sensor }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # ----------------------------------------------------
      # PUBLISHING STEPS (Only runs on Main Branch or Manual Trigger)
      # ----------------------------------------------------
      - name: Set up QEMU (ARM Support)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/honeywire-${{ matrix.sensor }}
          tags: |
            type=raw,value=latest

      - name: Build and Push
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          # FIX 1: Set the context to the root of the repo so it can see the SDKs folder
          context: . 
          # FIX 2: Explicitly point to the specific Dockerfile
          file: Sensors/official/${{ matrix.sensor }}/Dockerfile 
          
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.sensor }}
          cache-to: type=gha,mode=max,scope=${{ matrix.sensor }}
          provenance: true
          sbom: true

      - name: Summary
        run: |
          echo "### ✅ ${{ matrix.sensor }} Pipeline Complete" >> $GITHUB_STEP_SUMMARY