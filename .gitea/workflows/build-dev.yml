name: Modular Dev Sensor Build

on:
  workflow_dispatch:
    inputs:
      sensor:
        description: "Folder name (e.g., tcptarpit) or 'all' to build everything"
        required: true
        default: "all"
        type: string

jobs:
  # --- STAGE 1: GENERATE LIST ---
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.sensor }}"
          if [ "$INPUT" == "all" ]; then
            # Find all directories in Sensors/official that have a Dockerfile
            LIST=$(find Sensors/official -mindepth 1 -maxdepth 1 -type d -exec test -f '{}/Dockerfile' \; -print | awk -F/ '{print $3}' | jq -R -s -c 'split("\n")[:-1]')
          else
            # Wrap the single input into a JSON array
            LIST=$(echo "[\"$INPUT\"]")
          fi
          echo "matrix=$LIST" >> $GITHUB_OUTPUT

  # --- STAGE 2: BUILD ---
  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sensor: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Push locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Sensors/official/${{ matrix.sensor }}/Dockerfile 
          push: true
          # Exactly matching your naming convention
          tags: 192.168.1.11:5000/honeywire-${{ matrix.sensor }}:dev