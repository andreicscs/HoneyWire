name: Manual Dev Sensor Build

on:
  workflow_dispatch:
    inputs:
      sensor:
        description: "Exact folder name (e.g.FileCanary, TcpTarpit, NetworkScanDetector, WebRouterDecoy) or 'all'"
        required: true
        default: "all"
        type: string

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------
      # 1. ENVIRONMENT SETUP
      # -----------------------------------------------------
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # Update this to your project's Go version

      - name: Setup Python (For MockHub)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # -----------------------------------------------------
      # 2. SECURITY SCANS (Runs before building)
      # -----------------------------------------------------

      - name: Run Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          token-setup-trivy: ''

      # -----------------------------------------------------
      # 3. BUILD, TEST, AND PUSH
      # -----------------------------------------------------

      - name: Build, Test, and Push Sensors
        env: # Bind the input to a safe environment variable first
          SENSOR_INPUT: ${{ inputs.sensor }}
        run: |
          INPUT="$SENSOR_INPUT"
          if [ -z "$INPUT" ] || [ "$INPUT" == "all" ]; then
            DIRS=$(find Sensors/official -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
          else
            DIRS="$INPUT"
          fi

          echo "Targeting sensors: $DIRS"

          for SENSOR in $DIRS; do
            if [ -n "$SENSOR" ]; then
              SENSOR_PATH="Sensors/official/$SENSOR"
              LOWER_NAME=$(echo "$SENSOR" | tr '[:upper:]' '[:lower:]')
              TAG="192.168.1.11:5000/honeywire-$LOWER_NAME:dev"
              
              echo "========================================"
              echo "🧪 STAGE 1: Go Unit Tests for $SENSOR"
              echo "========================================"
              
              # Navigate to the sensor directory and run unit tests
              cd "$SENSOR_PATH"
              go test -v ./...
              # The pipeline will automatically fail and exit here if tests fail
              cd - > /dev/null
              
              echo "========================================"
              echo "🍯 STAGE 2: Building Image -> $TAG"
              echo "========================================"
              
              docker build -t "$TAG" -f "$SENSOR_PATH/Dockerfile" .

              echo "========================================"
              echo "🤝 STAGE 3: MockHub Contract Test"
              echo "========================================"
              
              # 1. Ensure clean slate
              rm -f /tmp/test_passed
              
              # 2. Start the MockHub in the background (Update the path to where you saved the script)
              python scripts/mockhub.py &
              MOCK_PID=$!
              
              # Give the MockHub a second to bind to port 8080
              sleep 2
              
              # 3. Run the newly built sensor container
              # Note: --network host allows the container to reach the runner's localhost:8080
              # You may need to pass environment variables your sensor expects (e.g., -e HUB_URL=http://127.0.0.1:8080)
              docker run -d --rm --name test-sensor --network host "$TAG"
              
              # 4. Poll for the success file created by MockHub
              TIMEOUT=30
              TEST_PASSED=false
              
              echo "Waiting up to $TIMEOUT seconds for sensor to sync and send valid event..."
              while [ $TIMEOUT -gt 0 ]; do
                if [ -f /tmp/test_passed ] && grep -q 'success' /tmp/test_passed; then
                  TEST_PASSED=true
                  break
                fi
                sleep 1
                TIMEOUT=$((TIMEOUT-1))
              done
              
              # 5. Cleanup Testing Environment
              echo "Cleaning up test containers and MockHub..."
              docker stop test-sensor || true
              kill $MOCK_PID || true
              
              # 6. Evaluate Test Results
              if [ "$TEST_PASSED" = true ]; then
                echo "✅ Integration Test Passed! Pushing image to registry..."
                docker push "$TAG"
              else
                echo "❌ Integration Test Failed or Timed Out!"
                echo "--- Sensor Container Logs ---"
                docker logs test-sensor || true
                exit 1 # Halt the entire pipeline
              fi
              
            fi
          done