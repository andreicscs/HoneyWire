name: Manual Dev Sensor Build

on:
  workflow_dispatch:
    inputs:
      sensor:
        description: "Folder name (e.g., tcptarpit) or 'all'"
        required: true
        default: "all"
        type: string

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.sensor }}"
          
          if [ "$INPUT" == "all" ]; then
            # Safely grab folder names, excluding empty lines
            RAW_LIST=$(find Sensors/official -mindepth 1 -maxdepth 1 -type d -exec test -f '{}/Dockerfile' \; -print | awk -F/ '{print $3}' | grep -v '^$')
          else
            RAW_LIST="$INPUT"
          fi
          
          # Convert to JSON array safely
          MATRIX_JSON=$(echo "$RAW_LIST" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sensor: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Push locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Sensors/official/${{ matrix.sensor }}/Dockerfile 
          push: true
          tags: 192.168.1.11:5000/honeywire-${{ matrix.sensor }}:dev