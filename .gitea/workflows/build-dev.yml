name: Manual Dev Sensor Build

on:
  workflow_dispatch:
    inputs:
      sensor:
        description: "Exact folder name (e.g., TcpTarpit) or 'all'"
        required: true
        default: "all"
        type: string

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.sensor }}"
          
          if [ "$INPUT" == "all" ]; then
            # Grab exact case-sensitive folder names
            RAW_LIST=$(find Sensors/official -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
          else
            RAW_LIST="$INPUT"
          fi
          
          # Convert to JSON array safely
          MATRIX_JSON=$(echo "$RAW_LIST" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sensor: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Format Docker Tag (Lowercase)
        id: format-tag
        run: |
          # Docker strictly requires lowercase tags. 
          # This converts 'TcpTarpit' to 'tcptarpit'
          LOWER_NAME=$(echo "${{ matrix.sensor }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=$LOWER_NAME" >> $GITHUB_OUTPUT

      - name: Build and Push locally
        uses: docker/build-push-action@v5
        with:
          context: .
          # Use exact case for the folder path
          file: Sensors/official/${{ matrix.sensor }}/Dockerfile 
          push: true
          # Use the lowercased name for the docker tag
          tags: 192.168.1.11:5000/honeywire-${{ steps.format-tag.outputs.tag }}:dev