name: Manual Dev Sensor Build

on:
  workflow_dispatch:
    inputs:
      sensor:
        description: "Exact folder name (e.g., TcpTarpit) or 'all'"
        required: true
        default: "all"
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Push Sensors
        run: |
          # 1. Determine which sensors to build
          INPUT="${{ inputs.sensor }}"
          if [ -z "$INPUT" ] || [ "$INPUT" == "all" ]; then
            DIRS=$(find Sensors/official -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
          else
            DIRS="$INPUT"
          fi

          echo "Targeting sensors: $DIRS"

          # 2. Loop through each folder, build, and push
          for SENSOR in $DIRS; do
            if [ -n "$SENSOR" ]; then
              # Force lowercase for Docker tag
              LOWER_NAME=$(echo "$SENSOR" | tr '[:upper:]' '[:lower:]')
              TAG="192.168.1.11:5000/honeywire-$LOWER_NAME:dev"
              
              echo "----------------------------------------"
              echo "🍯 Building $SENSOR as $TAG"
              echo "----------------------------------------"
              
              # Standard build and push (no custom actions needed)
              docker build -t "$TAG" -f "Sensors/official/$SENSOR/Dockerfile" .
              docker push "$TAG"
            fi
          done