name: Manual Dev Sensor Build

on:
  workflow_dispatch:
    inputs:
      sensor:
        description: "Sensor folder name (e.g., tcptarpit, webrouterdecoy, etc.)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and Push locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Sensors/official/${{ github.event.inputs.sensor }}/Dockerfile 
          push: true
          tags: 192.168.1.11:5000/honeywire-${{ github.event.inputs.sensor }}:dev